name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy bot to Railway
        run: |
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { serviceInstanceDeploy(environmentId: \\\"f70012a2-0289-47af-aaf1-28f4ae18935e\\\", serviceId: \\\"9af035bf-5518-42b1-8e7b-4026f7f18547\\\", commitSha: \\\"${{ github.sha }}\\\") }\"}"

      - name: Deploy dashboard to Railway
        run: |
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { serviceInstanceDeploy(environmentId: \\\"f70012a2-0289-47af-aaf1-28f4ae18935e\\\", serviceId: \\\"4698d4ce-d83f-403e-8844-770d06d70f86\\\", commitSha: \\\"${{ github.sha }}\\\") }\"}"
